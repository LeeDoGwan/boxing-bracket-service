spring:
  datasource:
    url: jdbc:mariadb://localhost:3306/boxing_bracket
    username: boxing
    password: boxing
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    baseline-on-migrate: false
    out-of-order: false

boxing:
  auth:
    enabled: false
